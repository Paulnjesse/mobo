version: '3.8'

# ── MOBO Monitoring Stack ─────────────────────────────────────────────────────
# Prometheus + Grafana for metrics, Jaeger for distributed tracing
# Usage: docker-compose -f docker-compose.yml -f docker-compose.monitoring.yml up

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: mobo_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - mobo_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: mobo_grafana
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-mobo_grafana_dev}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - mobo_network
    depends_on:
      - prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: mobo_jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver
      - "4317:4317"     # OTLP gRPC receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - mobo_network
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  mobo_network:
    external: true
    name: mobo_new_default
