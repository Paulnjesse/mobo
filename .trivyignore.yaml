# .trivyignore.yaml — Trivy suppression rules (YAML format, Trivy v0.46+)
# Replaces plain .trivyignore — YAML format supports both global CVE suppression
# and path-scoped misconfiguration suppression in one file.
# Review and update whenever dependencies or base images change.

misconfigurations:
  # DS026 — No HEALTHCHECK instruction defined
  # Health checks are managed externally by Render's platform health probes
  # and docker-compose healthcheck directives, not baked into images.
  - id: DS026
    statement: >
      HEALTHCHECK is managed by Render platform probes and docker-compose
      healthcheck directives. Baking it into images would duplicate and
      potentially conflict with the external health check configuration.

  # DS002 — Processes running as root (pgbouncer only)
  # The edoburu/pgbouncer base image entrypoint must run as root at startup
  # to write /etc/pgbouncer/pgbouncer.ini, then drops to the pgbouncer OS
  # user before exec-ing the daemon. Adding USER pgbouncer in our Dockerfile
  # breaks the entrypoint. All other service Dockerfiles use USER node/appuser.
  - id: DS002
    paths:
      - pgbouncer/Dockerfile
    statement: >
      edoburu/pgbouncer entrypoint writes config files as root then drops to
      pgbouncer user at runtime. USER directive cannot be added without breaking
      the entrypoint. See https://github.com/edoburu/docker-pgbouncer

vulnerabilities:
  # ── admin/ CRA react-scripts ecosystem ──────────────────────────────────────
  # The admin dashboard is a Create React App (CRA) static build.
  # react-scripts pins transitive build-tool dependencies (nth-check, svgo,
  # workbox, @svgr/*, css-select, serialize-javascript, etc.) that have known
  # CVEs. These packages are webpack/build-time only — NOT included in the
  # production static bundle served to browsers. Upgrading requires a
  # semver-major react-scripts bump (0.0.0 = effectively eject CRA).
  # Mitigation: admin/ package manifests excluded from vuln scan via skip-files.

  # nth-check ReDoS (GHSA-rp65-9cf3-cjxr)
  - id: CVE-2021-3803
    statement: CRA build-time dependency locked by react-scripts, not shipped to production

  # node-forge signature verification bypass
  - id: CVE-2022-24771
    statement: CRA build-time dependency locked by react-scripts, not shipped to production
  - id: CVE-2022-24772
    statement: CRA build-time dependency locked by react-scripts, not shipped to production
  - id: CVE-2022-24773
    statement: CRA build-time dependency locked by react-scripts, not shipped to production

  # underscore template injection
