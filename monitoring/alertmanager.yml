# Alertmanager configuration for MOBO production alerting
# Routes alerts to Slack (all) and PagerDuty (critical-only).
# Set SLACK_WEBHOOK_URL and PAGERDUTY_INTEGRATION_KEY in your environment.

global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK_URL}'

# Route tree: critical → PagerDuty + Slack; everything else → Slack only
route:
  group_by: ['alertname', 'team']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 3h
  receiver: 'slack-platform'
  routes:
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true   # also send to Slack
    - match:
        team: payments
      receiver: 'slack-payments'
    - match:
        team: security
      receiver: 'slack-security'

receivers:
  - name: 'slack-platform'
    slack_configs:
      - channel: '#alerts-platform'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
          {{ end }}

  - name: 'slack-payments'
    slack_configs:
      - channel: '#alerts-payments'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'slack-security'
    slack_configs:
      - channel: '#alerts-security'
        send_resolved: true
        title: '[SECURITY {{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_INTEGRATION_KEY}'
        description: '{{ .GroupLabels.alertname }}: {{ (index .Alerts 0).Annotations.summary }}'
        severity: '{{ (index .Alerts 0).Labels.severity }}'
        details:
          description: '{{ (index .Alerts 0).Annotations.description }}'
          runbook:     '{{ (index .Alerts 0).Annotations.runbook }}'

inhibit_rules:
  # Suppress warnings when a critical alert is firing for the same service
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'team']
