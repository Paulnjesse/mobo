version: '3.9'
services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: mobo_db
    environment:
      POSTGRES_DB: mobo
      POSTGRES_USER: mobo_user
      POSTGRES_PASSWORD: mobo_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobo_user -d mobo"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: mobo_gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      USER_SERVICE_URL: http://user-service:3001
      RIDE_SERVICE_URL: http://ride-service:3002
      PAYMENT_SERVICE_URL: http://payment-service:3003
      LOCATION_SERVICE_URL: http://location-service:3004
      JWT_SECRET: mobo_jwt_secret_change_in_production
    depends_on:
      - user-service
      - ride-service
      - payment-service
      - location-service

  user-service:
    build: ./services/user-service
    container_name: mobo_user
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://mobo_user:mobo_pass@db:5432/mobo
      JWT_SECRET: mobo_jwt_secret_change_in_production
      JWT_EXPIRES_IN: 7d
    depends_on:
      db:
        condition: service_healthy

  ride-service:
    build: ./services/ride-service
    container_name: mobo_ride
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://mobo_user:mobo_pass@db:5432/mobo
      JWT_SECRET: mobo_jwt_secret_change_in_production
      LOCATION_SERVICE_URL: http://location-service:3004
      PAYMENT_SERVICE_URL: http://payment-service:3003
      SOCKET_CORS_ORIGIN: http://localhost:3000,http://localhost:8081,exp://localhost:8081
    depends_on:
      db:
        condition: service_healthy

  payment-service:
    build: ./services/payment-service
    container_name: mobo_payment
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://mobo_user:mobo_pass@db:5432/mobo
      JWT_SECRET: mobo_jwt_secret_change_in_production
      FLUTTERWAVE_SECRET_KEY: FLWSECK_TEST-xxxx
      STRIPE_SECRET_KEY: sk_test_xxxx
    depends_on:
      db:
        condition: service_healthy

  location-service:
    build: ./services/location-service
    container_name: mobo_location
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://mobo_user:mobo_pass@db:5432/mobo
      JWT_SECRET: mobo_jwt_secret_change_in_production
      GOOGLE_MAPS_API_KEY: AIza_your_key_here
      SOCKET_CORS_ORIGIN: http://localhost:3000,http://localhost:8081,exp://localhost:8081
    depends_on:
      db:
        condition: service_healthy

  # ── ML Fraud Detection Service ─────────────────────────────────────────────
  ml-service:
    build: ./services/ml-service
    container_name: mobo_ml
    ports:
      - "8000:8000"
    environment:
      INTERNAL_SERVICE_KEY: mobo_internal_key_change_in_production
      MODEL_DIR: /tmp/models
    volumes:
      - ml_models:/tmp/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health').raise_for_status()\""]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Unleash: self-hosted feature flags ────────────────────────────────────
  unleash-db:
    image: postgres:15-alpine
    container_name: mobo_unleash_db
    environment:
      POSTGRES_DB:       unleash
      POSTGRES_USER:     unleash
      POSTGRES_PASSWORD: unleash_pass
    volumes:
      - unleash_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash"]
      interval: 10s
      timeout: 5s
      retries: 5

  unleash:
    image: unleashorg/unleash-server:6
    container_name: mobo_unleash
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL:           postgresql://unleash:unleash_pass@unleash-db:5432/unleash
      INIT_CLIENT_API_TOKENS: "mobo-service-client-token"
      AUTH_TYPE:              open
    depends_on:
      unleash-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:4242/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  pgdata:
  unleash_pgdata:
  ml_models:
