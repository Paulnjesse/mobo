envVarGroups:
  - name: mobo-shared-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        sync: false

services:
  - type: web
    name: mobo-user-service
    runtime: node
    rootDir: services/user-service
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DATABASE_READ_URL
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false

  - type: web
    name: mobo-ride-service
    runtime: node
    rootDir: services/ride-service
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: LOCATION_SERVICE_URL
        sync: false
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: DATABASE_READ_URL
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false

  - type: web
    name: mobo-payment-service
    runtime: node
    rootDir: services/payment-service
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: DATABASE_READ_URL
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false

  - type: web
    name: mobo-location-service
    runtime: node
    rootDir: services/location-service
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3004
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: DATABASE_READ_URL
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false

  - type: web
    name: mobo-api-gateway
    runtime: node
    rootDir: api-gateway
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: USER_SERVICE_URL
        sync: false
      - key: RIDE_SERVICE_URL
        sync: false
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: LOCATION_SERVICE_URL
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false

  - type: web
    name: mobo-admin
    runtime: docker
    rootDir: admin
    envVars:
      - key: REACT_APP_API_URL
        value: https://mobo-api-gateway.onrender.com/api
