databases:
  # ── Primary PostgreSQL (Oregon — US West) ──────────────────────────────────────
  - name: mobo-db-primary
    region: oregon
    plan: standard          # 2 vCPU, 4 GB RAM, 256 GB SSD
    postgresMajorVersion: 16
    ipAllowList: []         # Allow all Render private network IPs (services use internal URLs)

  # ── Read Replica (Frankfurt — EU West) for GDPR data residency compliance ─────
  # Promote to primary manually via Render dashboard if Oregon becomes unavailable.
  # RTO target: 30 minutes (manual promotion) | RPO target: < 60 seconds
  - name: mobo-db-replica-eu
    region: frankfurt
    plan: standard
    postgresMajorVersion: 16
    ipAllowList: []

envVarGroups:
  - name: mobo-shared-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mobo-db-primary
          property: connectionString
      - key: DATABASE_READ_URL
        fromDatabase:
          name: mobo-db-replica-eu
          property: connectionString
      - key: INTERNAL_SERVICE_KEY
        generateValue: true   # shared secret for inter-service auth + mTLS bearer token
      - key: SERVICE_CA_CERT
        sync: false           # Base64-encoded internal CA cert (for mTLS client validation)
      - key: DB_SSL_CA
        sync: false           # SEC-001: PEM CA cert for PostgreSQL TLS validation (rejectUnauthorized: true)
                              # Download from Render Dashboard → PostgreSQL → Connection → CA Certificate
                              # Store as single-line with \n replacing actual newlines

services:
  # ── User Service ──────────────────────────────────────────────────────────────
  - type: web
    name: mobo-user-service
    region: oregon            # primary region — matches mobo-db-primary
    runtime: node
    rootDir: services/user-service
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    scaling:
      minInstances: 2
      maxInstances: 5
      targetMemoryPercent: 75
      targetCPUPercent: 70
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DATABASE_READ_URL
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_TEAM_ID
        sync: false
      - key: APPLE_KEY_ID
        sync: false
      - key: CORS_ORIGIN
        value: https://mobo-api-gateway.onrender.com,https://mobo.cm,https://app.mobo.cm

  # ── Ride Service ──────────────────────────────────────────────────────────────
  - type: web
    name: mobo-ride-service
    region: oregon
    runtime: node
    rootDir: services/ride-service
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    scaling:
      minInstances: 2
      maxInstances: 6
      targetMemoryPercent: 75
      targetCPUPercent: 70
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: LOCATION_SERVICE_URL
        sync: false
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: DATABASE_READ_URL
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: SOCKET_CORS_ORIGIN
        value: https://mobo-api-gateway.onrender.com,https://mobo.cm,https://app.mobo.cm

  # ── Payment Service ───────────────────────────────────────────────────────────
  - type: web
    name: mobo-payment-service
    region: oregon
    runtime: node
    rootDir: services/payment-service
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    scaling:
      minInstances: 2
      maxInstances: 4
      targetMemoryPercent: 70
      targetCPUPercent: 65
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MTN_API_USER
        sync: false
      - key: MTN_API_KEY
        sync: false
      - key: MTN_SUBSCRIPTION_KEY
        sync: false
      - key: ORANGE_CLIENT_ID
        sync: false
      - key: ORANGE_CLIENT_SECRET
        sync: false
      - key: DATABASE_READ_URL
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: CORS_ORIGIN
        value: https://mobo-api-gateway.onrender.com,https://mobo.cm,https://app.mobo.cm

  # ── Location Service ──────────────────────────────────────────────────────────
  - type: web
    name: mobo-location-service
    region: oregon
    runtime: node
    rootDir: services/location-service
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    scaling:
      minInstances: 2
      maxInstances: 5
      targetMemoryPercent: 75
      targetCPUPercent: 70
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3004
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: DATABASE_READ_URL
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: CORS_ORIGIN
        value: https://mobo-api-gateway.onrender.com,https://mobo.cm,https://app.mobo.cm

  # ── API Gateway ───────────────────────────────────────────────────────────────
  - type: web
    name: mobo-api-gateway
    region: oregon
    runtime: node
    rootDir: api-gateway
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    scaling:
      minInstances: 2
      maxInstances: 8
      targetMemoryPercent: 70
      targetCPUPercent: 65
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: USER_SERVICE_URL
        sync: false
      - key: RIDE_SERVICE_URL
        sync: false
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: LOCATION_SERVICE_URL
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: CORS_ORIGIN
        value: https://mobo.cm,https://app.mobo.cm,https://admin.mobo.cm

  # ── ML Fraud Detection Service ────────────────────────────────────────────────
  - name: mobo-ml-service
    type: web
    env: python
    region: oregon
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    rootDir: services/ml-service
    envVars:
      - key: INTERNAL_SERVICE_KEY
        fromGroup: mobo-shared-secrets
      - key: MODEL_DIR
        value: /tmp/models

  # ── Admin Dashboard ───────────────────────────────────────────────────────────
  - type: web
    name: mobo-admin
    runtime: docker
    rootDir: admin
    healthCheckPath: /
    envVars:
      - key: REACT_APP_API_URL
        value: https://mobo-api-gateway.onrender.com/api
      - key: REACT_APP_STRIPE_PUBLISHABLE_KEY
        sync: false
