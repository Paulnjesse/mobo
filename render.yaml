databases:
  # ── Primary PostgreSQL (Frankfurt — EU Central, ~100ms from West Africa) ──────
  - name: mobo-db-primary
    region: frankfurt
    plan: standard          # 2 vCPU, 4 GB RAM, 256 GB SSD
    postgresMajorVersion: 16
    ipAllowList: []         # Allow all Render private network IPs (services use internal URLs)

  # ── Read Replica (Frankfurt — EU West) for GDPR data residency compliance ─────
  # Promote to primary manually via Render dashboard if primary becomes unavailable.
  # RTO target: 30 minutes (manual promotion) | RPO target: < 60 seconds
  - name: mobo-db-replica-eu
    region: frankfurt
    plan: standard
    postgresMajorVersion: 16
    ipAllowList: []

envVarGroups:
  - name: mobo-shared-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: REDIS_URL
        # Set to your Redis provider URL (Render Redis, Upstash, Redis Cloud).
        # Required for: Socket.IO Redis adapter, BullMQ queues, rate-limit store,
        # driver location cache.  All features degrade gracefully without it but
        # MUST be set in production.
        sync: false
      # ── Database connections go through PgBouncer (private service below) ──
      # In production set DATABASE_URL to the internal URL of the pgbouncer
      # private service:  postgres://mobo_user:<pass>@mobo-pgbouncer:5432/mobo
      # Set DATABASE_URL_DIRECT to the raw Render PostgreSQL connection string
      # for migrations only (pgbouncer transaction mode blocks DDL statements).
      - key: DATABASE_URL
        # PgBouncer private-service internal URL — set manually in Render dashboard.
        # Format: postgres://mobo_user:<PASSWORD>@mobo-pgbouncer:5432/mobo
        sync: false
      - key: DATABASE_URL_DIRECT
        # Raw PostgreSQL connection string — used by migration scripts only.
        fromDatabase:
          name: mobo-db-primary
          property: connectionString
      - key: DATABASE_READ_URL
        fromDatabase:
          name: mobo-db-replica-eu
          property: connectionString
      - key: INTERNAL_SERVICE_KEY
        generateValue: true   # shared secret for inter-service auth + mTLS bearer token
      - key: SERVICE_CA_CERT
        sync: false           # Base64-encoded internal CA cert (for mTLS client validation)
      - key: DB_SSL_CA
        sync: false           # SEC-001: PEM CA cert for PostgreSQL TLS validation (rejectUnauthorized: true)
                              # Download from Render Dashboard → PostgreSQL → Connection → CA Certificate
                              # Store as single-line with \n replacing actual newlines
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true   # 32-byte key for field-level encryption of sensitive DB columns
      - key: REQUIRE_RS256
        value: "true"         # BLOCK-5: Force RS256 JWT signing even outside NODE_ENV=production

services:
  # ── PgBouncer — PostgreSQL connection pooler (private service) ────────────────
  # WHY: Each Node.js service uses pg.Pool(max:20). At 6 ride-service instances
  #      that is 120 direct DB connections. PostgreSQL's default max_connections
  #      is 100, so without a pooler services would be refused connections at scale.
  #      PgBouncer in transaction mode multiplexes up to MAX_CLIENT_CONN=500 client
  #      connections onto DEFAULT_POOL_SIZE=25 real server connections.
  #
  # DEPLOY STEPS:
  #   1. Deploy this service first — it must be running before the app services start.
  #   2. Copy the private service's internal hostname from the Render dashboard.
  #   3. Set DATABASE_URL in mobo-shared-secrets to:
  #        postgres://mobo_user:<DB_PASSWORD>@<pgbouncer-internal-host>:5432/mobo
  #   4. Keep DATABASE_URL_DIRECT pointing at the raw Render PostgreSQL URL for
  #      running migrations (npm run migrate) which require a session connection.
  #
  # TRANSACTION MODE COMPATIBILITY:
  #   - Named prepared statements are NOT supported — MOBO uses $1/$2 params only ✓
  #   - Session-level SET is reset between transactions — not used in MOBO ✓
  #   - Advisory locks must not span transactions — MOBO does not use them ✓
  - type: pserv
    name: mobo-pgbouncer
    region: frankfurt
    runtime: docker
    rootDir: pgbouncer
    envVars:
      - key: DB_USER
        value: mobo_user
      - key: DB_PASSWORD
        fromDatabase:
          name: mobo-db-primary
          property: password
      - key: DB_HOST
        fromDatabase:
          name: mobo-db-primary
          property: host
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: mobo
      - key: POOL_MODE
        value: transaction
      - key: SERVER_RESET_QUERY
        value: DISCARD ALL
      - key: MAX_CLIENT_CONN
        value: 500
      - key: DEFAULT_POOL_SIZE
        value: 25
      - key: MIN_POOL_SIZE
        value: 5
      - key: RESERVE_POOL_SIZE
        value: 5
      - key: SERVER_IDLE_TIMEOUT
        value: 600
      - key: AUTH_TYPE
        value: md5

  # ── User Service ──────────────────────────────────────────────────────────────
  - type: web
    name: mobo-user-service
    region: frankfurt            # primary region — Frankfurt ~100ms to West/Central Africa
    runtime: node
    rootDir: services/user-service
    buildCommand: npm install
    # preDeployCommand runs migrations using DATABASE_URL_DIRECT (bypasses PgBouncer —
    # DDL statements require a session connection, not transaction-mode pooling).
    preDeployCommand: DATABASE_URL=$DATABASE_URL_DIRECT node ../../database/run_migrations.js
    startCommand: node server.js
    healthCheckPath: /health
    scaling:
      minInstances: 2
      maxInstances: 5
      targetMemoryPercent: 75
      targetCPUPercent: 70
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_EXPIRES_IN
        value: 7d
      # ── SMS (Twilio) ──────────────────────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      # ── Email (SMTP) ──────────────────────────────────────────────────────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        value: noreply@mobo-ride.com
      # ── Google Sign-In ────────────────────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID_WEB
        sync: false
      - key: GOOGLE_CLIENT_ID_IOS
        sync: false
      - key: GOOGLE_CLIENT_ID_ANDROID
        sync: false
      # ── Apple Sign-In ─────────────────────────────────────────────────────────
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_TEAM_ID
        sync: false
      - key: APPLE_KEY_ID
        sync: false
      - key: APPLE_APP_BUNDLE_ID
        sync: false
      # ── Facebook Sign-In ──────────────────────────────────────────────────────
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      # ── Smile Identity (KYC / Biometric verification) ─────────────────────────
      - key: SMILE_ID_PARTNER_ID
        sync: false
      - key: SMILE_ID_API_KEY
        sync: false
      - key: SMILE_ID_BASE_URL
        sync: false
      - key: SMILE_ID_CALLBACK_URL
        sync: false
      - key: SMILE_PARTNER_ID
        sync: false
      - key: SMILE_API_KEY
        sync: false
      - key: SMILE_SID_SERVER
        value: "1"              # 0 = sandbox, 1 = production
      - key: LIVENESS_THRESHOLD
        value: "0.7"
      - key: SELFIE_MATCH_THRESHOLD
        value: "0.7"
      # ── Checkr (Background Checks for drivers) ────────────────────────────────
      - key: CHECKR_API_KEY
        sync: false
      - key: CHECKR_PACKAGE
        value: driver_pro
      - key: CHECKR_WEBHOOK_SECRET
        sync: false
      # ── Webhook secrets ───────────────────────────────────────────────────────
      - key: MTN_WEBHOOK_SECRET
        sync: false
      - key: ORANGE_WEBHOOK_SECRET
        sync: false
      # ── Access control ────────────────────────────────────────────────────────
      - key: ADMIN_ALLOWED_IPS
        sync: false
      # ── Observability ─────────────────────────────────────────────────────────
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: CORS_ORIGIN
        value: https://api.mobo-ride.com,https://app.mobo-ride.com,https://mobo-ride.com

  # ── Ride Service ──────────────────────────────────────────────────────────────
  - type: web
    name: mobo-ride-service
    region: frankfurt
    runtime: node
    rootDir: services/ride-service
    buildCommand: npm install
    preDeployCommand: DATABASE_URL=$DATABASE_URL_DIRECT node ../../database/run_migrations.js
    startCommand: node server.js
    healthCheckPath: /health
    scaling:
      minInstances: 2
      maxInstances: 6
      targetMemoryPercent: 75
      targetCPUPercent: 70
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      # ── Inter-service URLs ────────────────────────────────────────────────────
      - key: USER_SERVICE_URL
        sync: false
      - key: LOCATION_SERVICE_URL
        sync: false
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      # ── Maps ──────────────────────────────────────────────────────────────────
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      # ── Email (ride receipts / cancellation notices) ──────────────────────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        value: noreply@mobo-ride.com
      # ── SMS (Twilio) ──────────────────────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      # ── Observability ─────────────────────────────────────────────────────────
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: SOCKET_CORS_ORIGIN
        value: https://api.mobo-ride.com,https://app.mobo-ride.com,https://mobo-ride.com

  # ── Payment Service ───────────────────────────────────────────────────────────
  - type: web
    name: mobo-payment-service
    region: frankfurt
    runtime: node
    rootDir: services/payment-service
    buildCommand: npm install
    preDeployCommand: DATABASE_URL=$DATABASE_URL_DIRECT node ../../database/run_migrations.js
    startCommand: node server.js
    healthCheckPath: /health
    scaling:
      minInstances: 2
      maxInstances: 4
      targetMemoryPercent: 70
      targetCPUPercent: 65
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - key: API_BASE_URL
        value: https://api.mobo-ride.com
      # ── Flutterwave ───────────────────────────────────────────────────────────
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLW_SECRET_HASH
        sync: false             # Flutterwave webhook verification hash
      # ── Stripe ───────────────────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # ── MTN Mobile Money ──────────────────────────────────────────────────────
      - key: MTN_API_USER_ID
        sync: false
      - key: MTN_API_KEY
        sync: false
      - key: MTN_COLLECTION_SUBSCRIPTION_KEY
        sync: false
      - key: MTN_ENVIRONMENT
        value: production       # sandbox | production
      - key: MTN_BASE_URL
        value: https://proxy.momoapi.mtn.com
      - key: MTN_WEBHOOK_SECRET
        sync: false
      # ── Orange Money ──────────────────────────────────────────────────────────
      - key: ORANGE_CLIENT_ID
        sync: false
      - key: ORANGE_CLIENT_SECRET
        sync: false
      - key: ORANGE_MERCHANT_KEY
        sync: false
      - key: ORANGE_RETURN_URL
        value: https://mobo-ride.com/payment/return
      - key: ORANGE_CANCEL_URL
        value: https://mobo-ride.com/payment/cancel
      - key: ORANGE_NOTIF_URL
        value: https://api.mobo-ride.com/payments/webhook/orange
      - key: ORANGE_WEBHOOK_SECRET
        sync: false
      # ── Wave ──────────────────────────────────────────────────────────────────
      - key: WAVE_API_KEY
        sync: false
      - key: WAVE_BASE_URL
        value: https://api.wave.com/v1
      - key: WAVE_SUCCESS_URL
        value: https://mobo-ride.com/payment/success
      - key: WAVE_ERROR_URL
        value: https://mobo-ride.com/payment/error
      # ── Observability ─────────────────────────────────────────────────────────
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: CORS_ORIGIN
        value: https://api.mobo-ride.com,https://app.mobo-ride.com,https://mobo-ride.com

  # ── Location Service ──────────────────────────────────────────────────────────
  - type: web
    name: mobo-location-service
    region: frankfurt
    runtime: node
    rootDir: services/location-service
    buildCommand: npm install
    preDeployCommand: DATABASE_URL=$DATABASE_URL_DIRECT node ../../database/run_migrations.js
    startCommand: node server.js
    healthCheckPath: /health
    scaling:
      minInstances: 2
      maxInstances: 5
      targetMemoryPercent: 75
      targetCPUPercent: 70
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3004
      # ── Inter-service URLs ────────────────────────────────────────────────────
      - key: USER_SERVICE_URL
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      # ── Maps ──────────────────────────────────────────────────────────────────
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      # ── Twilio (anonymous call proxy) ─────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PROXY_SERVICE_SID
        sync: false
      # ── Location data retention ───────────────────────────────────────────────
      - key: LOCATION_RETENTION_DAYS
        value: "90"
      - key: LOCATION_PURGE_HOUR_UTC
        value: "3"
      # ── App base URL (used for callback links) ────────────────────────────────
      - key: APP_BASE_URL
        value: https://app.mobo-ride.com
      # ── Observability ─────────────────────────────────────────────────────────
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: CORS_ORIGIN
        value: https://api.mobo-ride.com,https://app.mobo-ride.com,https://mobo-ride.com

  # ── API Gateway ───────────────────────────────────────────────────────────────
  - type: web
    name: mobo-api-gateway
    region: frankfurt
    runtime: node
    rootDir: api-gateway
    buildCommand: npm install
    preDeployCommand: DATABASE_URL=$DATABASE_URL_DIRECT node ../database/run_migrations.js
    startCommand: node server.js
    healthCheckPath: /health
    # Custom domain: api.mobo-ride.com → CNAME mobo-api-gateway.onrender.com
    domains:
      - api.mobo-ride.com
    scaling:
      minInstances: 2
      maxInstances: 8
      targetMemoryPercent: 70
      targetCPUPercent: 65
    envVars:
      - fromGroup: mobo-shared-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # ── Upstream service URLs ─────────────────────────────────────────────────
      - key: USER_SERVICE_URL
        sync: false
      - key: RIDE_SERVICE_URL
        sync: false
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: LOCATION_SERVICE_URL
        sync: false
      # ── Access control ────────────────────────────────────────────────────────
      - key: CLIENT_URL
        value: https://app.mobo-ride.com
      - key: METRICS_ALLOWED_IPS
        sync: false             # Comma-separated IPs allowed to scrape /metrics
      # ── Observability ─────────────────────────────────────────────────────────
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: CORS_ORIGIN
        value: https://mobo-ride.com,https://www.mobo-ride.com,https://app.mobo-ride.com,https://admin.mobo-ride.com

  # ── ML Fraud Detection Service ────────────────────────────────────────────────
  - name: mobo-ml-service
    type: web
    env: python
    region: frankfurt
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    rootDir: services/ml-service
    healthCheckPath: /health
    envVars:
      - key: INTERNAL_SERVICE_KEY
        fromGroup: mobo-shared-secrets
      - key: SENTRY_DSN
        fromGroup: mobo-shared-secrets
      - key: MODEL_DIR
        value: /tmp/models

  # ── Admin Dashboard ───────────────────────────────────────────────────────────
  - type: web
    name: mobo-admin
    runtime: docker
    rootDir: admin
    healthCheckPath: /
    # Custom domain: admin.mobo-ride.com → CNAME mobo-admin.onrender.com
    domains:
      - admin.mobo-ride.com
    envVars:
      - key: REACT_APP_API_URL
        value: https://api.mobo-ride.com/api
      - key: REACT_APP_STRIPE_PUBLISHABLE_KEY
        sync: false
