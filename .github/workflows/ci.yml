name: MOBO CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── User Service ─────────────────────────────────────────────────────────────
  test-user-service:
    name: User Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/user-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/user-service/package-lock.json
      - run: npm ci --prefer-offline
      - run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-minimum-32-characters-long

  # ── Ride Service ─────────────────────────────────────────────────────────────
  test-ride-service:
    name: Ride Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ride-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/ride-service/package-lock.json
      - run: npm ci --prefer-offline
      - run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-minimum-32-characters-long

  # ── Payment Service ───────────────────────────────────────────────────────────
  test-payment-service:
    name: Payment Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/payment-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/payment-service/package-lock.json
      - run: npm ci --prefer-offline
      - run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-minimum-32-characters-long

  # ── Location Service ──────────────────────────────────────────────────────────
  test-location-service:
    name: Location Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/location-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/location-service/package-lock.json
      - run: npm ci --prefer-offline
      - run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-minimum-32-characters-long

  # ── API Gateway ───────────────────────────────────────────────────────────────
  test-api-gateway:
    name: API Gateway Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-gateway/package-lock.json
      - run: npm ci --prefer-offline
      - run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-minimum-32-characters-long

  # ── Deploy gate (only on main after all tests pass) ───────────────────────────
  deploy-gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    needs:
      - test-user-service
      - test-ride-service
      - test-payment-service
      - test-location-service
      - test-api-gateway
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: All tests passed — ready to deploy
        run: |
          echo "✅ All service tests passed."
          echo "Deploy to Render via render.yaml or trigger manually."
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
