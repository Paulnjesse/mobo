          │              [Microservices — Private Network]          │
          │    ├─ user-service    port 3001                         │
          │    ├─ ride-service    port 3002                         │
          │    ├─ payment-service port 3003                         │
          │    └─ location-service port 3004                        │
          │              (auth: X-Internal-Service-Key,             │
          │               timing-safe comparison)                   │
          │                           │                             │
          │  [Data Layer]                                           │
          │    ├─ PostgreSQL: TLS + cert validation                 │
          │    └─ Redis:      TLS (rediss://)                       │
          │                                                         │
          └─────────────────────────────────────────────────────────┘
          \`\`\`

          ---

          ## Pipeline Security Gates

          | Gate | Condition | Action on Failure |
          |------|-----------|-------------------|
          | Zero Secrets | No credentials in any commit | Block deploy |
          | Zero Critical CVEs | npm audit + Snyk | Block deploy |
          | Zero High CVEs (main) | npm audit | Block deploy |
          | No AsyncStorage tokens | Regression guard | Block deploy |
          | No hardcoded URLs | Regression guard | Block deploy |
          | SAST clean | CodeQL + Semgrep | Block deploy |
          | Tests pass | All unit + integration | Block deploy |
          | DAST clean | OWASP ZAP (main only) | Block deploy |
          | License compliant | No GPL/AGPL | Block deploy |

          ---

          ## Artifacts Generated This Run

          | Artifact | Description | Retention |
          |----------|-------------|-----------|
          | `sca-audit-*` | npm audit + Snyk JSON reports per service | 30 days |
          | `coverage-*` | Unit test coverage per service | 14 days |
          | `sbom-cyclonedx` | Software Bill of Materials (CycloneDX JSON) | 90 days |
          | `zap-dast-report` | OWASP ZAP active scan results | 30 days |
          | `integration-test-results` | Full integration test output | 14 days |
          | GitHub Security tab | CodeQL + Semgrep + Trivy SARIF | Permanent |

          ---

          ## Remediation Tracking

          | ID | Finding | Severity | Status | Target Date |
          |----|---------|----------|--------|-------------|
          | REM-001 | AsyncStorage token storage | Critical | ✅ Resolved | Completed |
          | REM-002 | DB SSL rejectUnauthorized:false | Critical | ✅ Resolved | Completed |
          | REM-003 | Timing-unsafe service auth | Critical | ✅ Resolved | Completed |
          | REM-004 | JWT algorithm confusion | High | ✅ Resolved | Completed |
          | REM-005 | MIME spoofing on file upload | High | ✅ Resolved | Completed |
          | REM-006 | Fail-open fatigue check | High | ✅ Resolved | Completed |
          | REM-007 | Location update rate limiting | High | ✅ Resolved | Completed |
          | REM-008 | No secrets scanning in CI | High | ✅ Resolved | Completed |
          | REM-009 | GDPR data export endpoint | Medium | 🔄 In Progress | 30 days |
          | REM-010 | mTLS for service-to-service | Medium | 📅 Planned | 60 days |
          | REM-011 | PCI payment audit log | Medium | 📅 Planned | 45 days |
          | REM-012 | Multi-region failover | Low | 📅 Planned | 90 days |

          ---

          ## Compliance Status

          ### PCI DSS (SAQ A — card payments outsourced to Stripe)
          - [x] 3.4 — Mask PANs when displayed
          - [x] 6.3 — Vulnerability management via CI (npm audit)
          - [x] 8.2 — Unique user IDs (UUID-based)
          - [ ] 10.2 — Payment audit logs ← pending REM-011
          - [x] 12.10 — Incident response plan documented

          ### GDPR
          - [x] Article 17 — Right to erasure (soft-delete + anonymisation)
          - [x] Article 25 — Data minimisation (SecureStore, safe user subset)
          - [x] Article 32 — Security of processing (TLS, encryption at rest)
          - [ ] Article 20 — Data portability (export endpoint) ← pending REM-009
          - [ ] Article 28 — DPA with processors ← legal action required

          ---

          *This report was generated automatically by the MOBO Security Pipeline.*
          *For manual security review requests, contact the Security team.*
          *Report classification: INTERNAL — do not share externally.*
          REPORT_EOF

          echo "✅ Security audit report generated: security-audit-report.md"
          wc -l security-audit-report.md

      - name: Post report as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-audit-report.md', 'utf8');

            // Truncate to GitHub comment limit (65535 chars)
            const MAX_LEN = 60000;
            const body = report.length > MAX_LEN
              ? report.substring(0, MAX_LEN) + '\n\n_[Report truncated — see full artifact]_'
              : report;

            // Find existing comment to update (avoid duplicate comments)
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('MOBO Platform — Security Audit Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload security audit report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report-${{ github.run_number }}
          path: security-audit-report.md
          retention-days: 365   # Keep audit reports for 1 year (compliance)

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 8 — DEPLOY GATE
# ══════════════════════════════════════════════════════════════════════════════

  deploy-gate:
    name: "Gate: Deploy Authorization"
    runs-on: ubuntu-latest
    needs:
      - security-secrets
      - security-sast-codeql
      - security-sast-semgrep
      - security-sca
      - security-container
      - security-mobile
      - test-unit
      - compliance-sbom
      - compliance-licenses
      - generate-security-report
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    outputs:
      authorized: ${{ steps.gate.outputs.authorized }}
    steps:
      - name: Evaluate all security gate results
        id: gate
        run: |
          # Map each job result
          SECRETS="${{ needs.security-secrets.result }}"
          CODEQL="${{ needs.security-sast-codeql.result }}"
          SEMGREP="${{ needs.security-sast-semgrep.result }}"
          SCA="${{ needs.security-sca.result }}"
          CONTAINER="${{ needs.security-container.result }}"
          MOBILE="${{ needs.security-mobile.result }}"
          TESTS="${{ needs.test-unit.result }}"
          LICENSES="${{ needs.compliance-licenses.result }}"

          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║        MOBO DEPLOY GATE — SECURITY CHECKPOINT       ║"
          echo "╠══════════════════════════════════════════════════════╣"
          printf "║  %-28s  %-20s  ║\n" "Control" "Result"
          echo "╠══════════════════════════════════════════════════════╣"
          printf "║  %-28s  %-20s  ║\n" "Secret Detection" "[$SECRETS]"
          printf "║  %-28s  %-20s  ║\n" "SAST — CodeQL" "[$CODEQL]"
          printf "║  %-28s  %-20s  ║\n" "SAST — Semgrep" "[$SEMGREP]"
          printf "║  %-28s  %-20s  ║\n" "SCA — Dependency Audit" "[$SCA]"
          printf "║  %-28s  %-20s  ║\n" "Container Scan" "[$CONTAINER]"
          printf "║  %-28s  %-20s  ║\n" "Mobile Security" "[$MOBILE]"
          printf "║  %-28s  %-20s  ║\n" "Unit Tests" "[$TESTS]"
          printf "║  %-28s  %-20s  ║\n" "License Compliance" "[$LICENSES]"
          echo "╠══════════════════════════════════════════════════════╣"

          # Hard failures (blocking)
          BLOCKING_FAILURES=""
          for job_result_pair in "Secret Detection:$SECRETS" "SCA:$SCA" "Container:$CONTAINER" "Mobile:$MOBILE" "Tests:$TESTS" "Licenses:$LICENSES"; do
            name="${job_result_pair%%:*}"
            result="${job_result_pair##*:}"
            if [ "$result" = "failure" ]; then
              BLOCKING_FAILURES="$BLOCKING_FAILURES\n  🔴 $name FAILED"
            fi
          done

          if [ -n "$BLOCKING_FAILURES" ]; then
            echo "║  DECISION: 🚫 DEPLOY BLOCKED                        ║"
            echo "╚══════════════════════════════════════════════════════╝"
            echo ""
            echo "Blocking failures:"
            printf "$BLOCKING_FAILURES\n"
            echo ""
            echo "::error::Deploy blocked by security gate. Fix failures above before merging."
            echo "authorized=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "║  DECISION: ✅ DEPLOY AUTHORIZED                     ║"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
          echo "All security gates passed. Proceeding to production deployment."
          echo "authorized=true" >> $GITHUB_OUTPUT

      - name: Create deployment record
        run: |
          echo "Deployment authorized at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "Commit: ${{ github.sha }}"
          echo "Actor:  ${{ github.actor }}"
          echo "Run:    ${{ github.run_number }}"

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 9 — PRODUCTION DEPLOY (Render)
# ══════════════════════════════════════════════════════════════════════════════

  deploy-production:
    name: "Deploy: Production (Render)"
    runs-on: ubuntu-latest
    needs: [deploy-gate]
    if: needs.deploy-gate.outputs.authorized == 'true'
    environment:
      name: production
      url: https://mobo-api-gateway.onrender.com
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy — all services
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_IDS: ${{ secrets.RENDER_SERVICE_IDS }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "⚠️ RENDER_API_KEY not set — skipping automated deploy trigger"
            echo "Manual deploy: push to main triggers auto-deploy via render.yaml"
            exit 0
          fi

          echo "Triggering Render deploys..."
          # Deploy each service; RENDER_SERVICE_IDS is comma-separated
          IFS=',' read -ra SERVICE_IDS <<< "$RENDER_SERVICE_IDS"
          for service_id in "${SERVICE_IDS[@]}"; do
            service_id=$(echo "$service_id" | xargs)   # trim whitespace
            echo "  → Deploying $service_id"
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.render.com/v1/services/$service_id/deploys" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json")

            if [ "$HTTP_STATUS" = "201" ]; then
              echo "    ✅ Deploy triggered for $service_id"
            else
              echo "    ⚠️ Deploy response: HTTP $HTTP_STATUS for $service_id"
            fi
            sleep 2   # Avoid rate limiting
          done

      - name: Wait for deployment health
        run: |
          echo "Waiting 90 seconds for Render to deploy..."
          sleep 90

          echo "Checking service health..."
          SERVICES=(
            "https://mobo-api-gateway.onrender.com/health"
          )

          for url in "${SERVICES[@]}"; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$url" || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ $url → HTTP $HTTP"
            else
              echo "⚠️ $url → HTTP $HTTP (may still be starting)"
            fi
          done

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 10 — POST-DEPLOY SMOKE TESTS + SECURITY HEADERS VALIDATION
# ══════════════════════════════════════════════════════════════════════════════

  post-deploy-smoke:
    name: "Post-Deploy: Smoke Tests + Security Headers"
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always() && needs.deploy-production.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test — health endpoints
        run: |
          BASE="https://mobo-api-gateway.onrender.com"
          FAILED=0

          echo "Running post-deploy smoke tests..."

          # Health check
          STATUS=$(curl -sf "$BASE/health" | python3 -c "
          import json,sys
          try:
            d = json.load(sys.stdin)
            print('ok' if d.get('status') == 'healthy' else 'degraded')
          except:
            print('error')
          " 2>/dev/null || echo "unreachable")

          echo "  /health → $STATUS"
          if [ "$STATUS" != "ok" ]; then
            echo "::warning::Health check returned: $STATUS"
          fi

      - name: Security headers validation
        run: |
          echo "Validating security response headers..."
          BASE="https://mobo-api-gateway.onrender.com"

          HEADERS=$(curl -sI "$BASE/health" 2>/dev/null | tr '[:upper:]' '[:lower:]')

          check_header() {
            local name="$1"
            local pattern="$2"
            if echo "$HEADERS" | grep -q "$pattern"; then
              echo "  ✅ $name present"
            else
              echo "  ⚠️ $name MISSING — add to Helmet.js config"
              echo "::warning::Missing security header: $name"
            fi
          }

          check_header "Strict-Transport-Security (HSTS)"       "strict-transport-security"
          check_header "X-Content-Type-Options: nosniff"        "x-content-type-options"
          check_header "X-Frame-Options"                        "x-frame-options"
          check_header "X-XSS-Protection"                       "x-xss-protection"
          check_header "Referrer-Policy"                        "referrer-policy"
          check_header "Content-Security-Policy"                "content-security-policy"

          # Ensure dangerous headers are NOT present
          if echo "$HEADERS" | grep -qi "x-powered-by"; then
            echo "  🔴 X-Powered-By header exposed — remove it (fingerprinting risk)"
            echo "::error::X-Powered-By header must be removed (set helmet({ hidePoweredBy: true }))"
          else
            echo "  ✅ X-Powered-By header absent"
          fi

          if echo "$HEADERS" | grep -qi "server: "; then
            SERVER=$(echo "$HEADERS" | grep -i "^server:" | head -1)
            echo "  ⚠️ Server header exposed: $SERVER"
          else
            echo "  ✅ Server header absent"
          fi

      - name: TLS/SSL grade check
        run: |
          echo "Checking TLS configuration grade..."
          HOST="mobo-api-gateway.onrender.com"

          # Check TLS version — must be 1.2 minimum, prefer 1.3
          TLS_VERSION=$(curl -sv --max-time 15 "https://$HOST/health" 2>&1 | \
            grep -o "TLSv[0-9]\.[0-9]*" | tail -1 || echo "unknown")
          echo "  TLS version: $TLS_VERSION"

          if echo "$TLS_VERSION" | grep -qE "TLSv1\.[01]"; then
            echo "::error::TLS 1.0/1.1 detected — must use TLS 1.2 minimum"
          else
            echo "  ✅ TLS version is acceptable"
          fi

      - name: Notify deployment success
        if: success()
        run: |
          echo "══════════════════════════════════════════════"
          echo "  🚀 MOBO PLATFORM — DEPLOY COMPLETE"
          echo "  Commit:  ${{ github.sha }}"
          echo "  By:      ${{ github.actor }}"
          echo "  At:      $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "  URL:     https://mobo-api-gateway.onrender.com"
          echo "══════════════════════════════════════════════"

      - name: Notify on failure (Slack webhook)
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d '{
                "text": "🔴 *MOBO Post-Deploy Smoke Tests FAILED*",
                "attachments": [{
                  "color": "danger",
                  "fields": [
                    {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                    {"title": "Commit", "value": "${{ github.sha }}", "short": true},
                    {"title": "Actor", "value": "${{ github.actor }}", "short": true},
                    {"title": "Run", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                  ]
                }]
              }'
          fi
