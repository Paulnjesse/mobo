          | SAST (CodeQL) | GitHub CodeQL | ${{ needs.security-sast-codeql.result == 'success' && '✅ PASSED' || '⚠️ CHECK RESULTS' }} |
          | SAST (Semgrep) | Semgrep OSS | ${{ needs.security-sast-semgrep.result == 'success' && '✅ PASSED' || '⚠️ CHECK RESULTS' }} |
