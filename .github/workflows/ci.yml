          | Container/IaC Scan | Aqua Trivy | ${{ needs.security-container.result == 'success' && '✅ PASSED' || '❌ FAILED' }} |
          | Mobile Security | Custom regression guards | ${{ needs.security-mobile.result == 'success' && '✅ PASSED' || '❌ FAILED' }} |
          | Unit Tests | Jest | ${{ needs.test-unit.result == 'success' && '✅ PASSED' || '❌ FAILED' }} |

          ---

          ## OWASP Mobile Top 10 Coverage

          | # | Risk | Control Applied | Status |
          |---|------|----------------|--------|
          | M1 | Improper Platform Usage | SecureStore (Keychain/Keystore) for tokens | ✅ Fixed |
          | M2 | Insecure Data Storage | No PII in AsyncStorage; safe user subset only | ✅ Fixed |
          | M3 | Insecure Communication | TLS enforced; cert pinning via react-native-ssl-pinning | ✅ Fixed |
          | M4 | Insecure Authentication | JWT HS256 only; algorithm confusion prevented | ✅ Fixed |
          | M5 | Insufficient Cryptography | AES-256 via Keystore; no custom crypto | ✅ N/A |
          | M6 | Insecure Authorization | Role-based middleware (requireDriver, requireAdmin) | ✅ Fixed |
          | M7 | Client Code Quality | ESLint security plugin; no eval/Function() | ✅ Fixed |
          | M8 | Code Tampering | EAS build integrity; certificate pinning | ⚠️ Partial |
          | M9 | Reverse Engineering | No hardcoded secrets; env-driven config | ✅ Fixed |
          | M10 | Extraneous Functionality | No debug endpoints; test code excluded from builds | ✅ Fixed |

          ---

          ## OWASP API Security Top 10 Coverage

          | # | Risk | Control Applied | Status |
          |---|------|----------------|--------|
          | API1 | Broken Object Level Auth | Parameterized queries; user ID from JWT (not body) | ✅ Fixed |
          | API2 | Broken Authentication | JWT HS256; token expiry; refresh rotation | ✅ Fixed |
          | API3 | Broken Object Property Auth | Field allowlist in validateProfile middleware | ✅ Fixed |
          | API4 | Unrestricted Resource Consumption | Rate limiting (100/15m global; 20/15m auth; 2s/driver location) | ✅ Fixed |
          | API5 | Broken Function Level Auth | requireDriver/requireAdmin middleware on all sensitive routes | ✅ Fixed |
          | API6 | Unrestricted Access to Sensitive Flows | Location rate limiting + GPS sanity validation | ✅ Fixed |
          | API7 | Server Side Request Forgery | No user-controlled URL fetching in current codebase | ✅ N/A |
          | API8 | Security Misconfiguration | Helmet.js; strict CORS; production SSL; no debug routes | ✅ Fixed |
          | API9 | Improper Inventory Management | API versioned (/api/v1); SBOM generated | ✅ Fixed |
          | API10 | Unsafe Consumption of APIs | Google Maps/Twilio called with validated inputs only | ⚠️ Review |

          ---

          ## Vulnerability Statistics

          > Detailed findings available in the GitHub Security tab (Code Scanning Alerts)
          > and in the scan artifacts attached to this workflow run.

          | Severity | Count | Threshold | Gate |
          |----------|-------|-----------|------|
          | 🔴 Critical | _(see artifacts)_ | 0 allowed on main | Blocking |
          | 🟠 High | _(see artifacts)_ | 0 allowed on main | Blocking |
          | 🟡 Medium | _(see artifacts)_ | Review required | Non-blocking |
          | 🟢 Low | _(see artifacts)_ | Informational | Non-blocking |

          ---

          ## Security Architecture — Current State

          \`\`\`
          ┌─────────────────────────────────────────────────────────┐
          │                   MOBO SECURITY LAYERS                  │
          ├─────────────────────────────────────────────────────────┤
          │                                                         │
          │  [Mobile App]                                           │
